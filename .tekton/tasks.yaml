apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: flake8
spec:
  params:
    - name: repo-url
      default: ""
  steps:
    - name: flake8
      image: python:3.9-slim
      script: |
        apt-get update -qq && apt-get install -y git -qq
        git clone $(params.repo-url) /app
        cd /app
        pip install flake8 --quiet
        flake8 . --count --max-line-length=127 --statistics --exclude=.git,.tekton
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: pytest
spec:
  params:
    - name: repo-url
      default: ""
  steps:
    - name: pytest
      image: python:3.9-slim
      script: |
        apt-get update -qq && apt-get install -y git -qq
        git clone $(params.repo-url) /app
        cd /app
        pip install Flask==2.1.2 Werkzeug==2.1.2 python-dotenv==0.20.0 pytest --quiet
        python -m pytest tests/ -v --tb=short
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: build-image
spec:
  params:
    - name: repo-url
      default: ""
    - name: image
      default: ""
  steps:
    - name: build
      image: quay.io/buildah/stable:latest
      securityContext:
        privileged: true
      script: |
        git clone $(params.repo-url) /app
        buildah bud -t $(params.image) /app
        buildah push $(params.image)
